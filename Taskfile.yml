version: "3"

tasks:
  default:
    cmds:
      - task: list

  list:
    desc: List all tasks in the current project
    cmds:
      - task --list

  ###################################################
  ############## Install Dependencies ###############
  ###################################################

  install:
    desc: Install all dependencies for the project
    cmds:
      - task: install:frontend
      - task: install:backend
      - task: build

  install:frontend:
    desc: Install dependencies for the frontend packages
    cmds:
      - pnpm install

  install:backend:
    desc: Install dependencies for the Rust backend
    cmds:
      - cargo fetch

  ###################################################
  ############## Clean and Build Tasks ##############
  ###################################################

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf node_modules
      - |
        {{if eq OS "windows"}}
        pnpm -r exec -- powershell -NoProfile -Command "if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }"
        {{else}}
        pnpm -r exec -- rm -rf node_modules
        {{end}}
      - pnpm store prune
      - cargo clean

  lint:
    desc: Run linters on all Rust crates and frontend packages
    cmds:
      - task: lint:backend
      - task: lint:frontend

  lint:backend:
    desc: Run linters on all Rust crates
    silent: true
    cmds:
      - cargo fmt --all
      - cargo clippy --workspace -- -D warnings

  lint:frontend:
    desc: Run linters on all frontend packages
    silent: true
    cmds:
      - pnpm --filter @ora/web-client lint
      - pnpm --filter @ora/desktop lint
      - pnpm --filter @ora/platform lint

  export-contracts:
    desc: Regenerate TypeScript contracts and the frontend SDK package
    cmds:
      - cargo xtask export-contracts


  export-plugin-sdk:
    desc: Regenerate TypeScript plugin SDK and private runtime protocol types
    cmds:
      - cargo xtask export-plugin-sdk

  prepare-plugin-runtime:
    desc: Explicitly download, verify, bundle, and stage pinned plugin runtime resources
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/prepare-plugin-runtime.ps1

  verify-plugin-runtime-prepared:
    desc: Verify that pinned plugin runtime resources were prepared explicitly
    internal: true
    cmds:
      - powershell -NoProfile -Command "if (-not (Test-Path -LiteralPath 'runtime-assets/prepared/runtime-manifest.json' -PathType Leaf)) { throw 'plugin runtime resources are not prepared; run task prepare-plugin-runtime before consuming prepared assets' }"


  test-plugin-runtime-e2e:
    desc: Run ignored plugin manager E2E gates against prepared Bun and Windows Job
    cmds:
      - task: verify-plugin-runtime-prepared
      - pnpm --filter @ora-space/plugin-sdk build
      - cargo test -p ora-process bun_stdio_round_trips_through_windows_job_pipes -- --ignored --test-threads=1
      - cargo test -p ora-process abrupt_host_exit_closes_the_job_and_kills_descendants -- --ignored --test-threads=1
      - cargo test -p ora-plugin-manager --test management_e2e
      - cargo test -p ora-plugin-manager --test runtime_windows_e2e -- --ignored --test-threads=1
      - cargo test -p ora-plugin-manager --test plugin_library_e2e -- --ignored --test-threads=1

  build:
    desc: Build all crates
    cmds:
      - cargo build --workspace

  test:frontend:
    desc: Run TypeScript package test suites (contracts, platform, app-shell, mock-service)
    cmds:
      - task: lint:frontend
      - pnpm --filter @ora/contracts test
      - pnpm --filter @ora/platform test
      - pnpm --filter @ora/app-shell test
      - pnpm --filter @ora/mock-service test

  test:frontend:watch:
    desc: Re-run app-shell tests on file change
    cmds:
      - pnpm --filter @ora/app-shell test:watch

  test:backend:
    desc: Run Rust crate test suites
    cmds:
      - task: lint:backend
      - task: export-contracts
      - cargo test --workspace

  test:
    desc: Run lint, regenerate contracts, then frontend and Rust tests
    silent: true
    cmds:
      - task: test:frontend
      - task: test:backend

  ###################################################
  ############# Run Development Servers #############
  ###################################################

  run:prepare:
    desc: Ensure the local .data workspace and rustun repository exist
    cmds:
      - mkdir -p .data
      - |
        if [ ! -d .data/rustun ]; then
          git clone https://github.com/ora-space/rustun.git .data/rustun
        fi

  run:web-frontend:
    desc: Run the web frontend against the real HTTP backend
    env:
      VITE_ORA_CONTRACT_TRANSPORT: fetch
    cmds:
      - pnpm --filter @ora/web-client dev

  run:web-proto:
    desc: Run the web frontend with the in-browser mock service
    env:
      VITE_ORA_CONTRACT_TRANSPORT: mock
    cmds:
      - pnpm --filter @ora/web-client dev

  run:ui-showcase:
    desc: Run the UI component showcase in development mode
    cmds:
      - pnpm --filter @ora/ui-showcase dev

  run:web-backend:
    desc: Run the web server backend in development mode
    env:
      ORA_DATA_DIR: .data
      ORA_PROJECT_NAME: rustun
      ORA_PROJECT_PATH: .data/rustun
    cmds:
      - task: run:prepare
      - cargo run --bin ora_web_server
